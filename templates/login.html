<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mok Transports | Sales Recording Login</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0c2340;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    width:420px;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:20px;
}

h1{
    font-size:22px;
    margin-bottom:5px;
    color:#0c2340;
}

.subtitle{
    font-size:14px;
    color:#555;
    margin-bottom:30px;
}

label{
    display:block;
    text-align:left;
    margin-bottom:6px;
    font-size:14px;
    font-weight:bold;
    color:#333;
}

select,
input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    width:100%;
    padding:14px;
    background:#1e08b0;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e27f08;
}

.error{
    background:#ffe5e5;
    color:#b30000;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
    font-size:14px;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#888;
}

</style>

</head>

<body>

<div class="login-container">

<img src="/static/logo.png" class="logo">

<h1>Mok Transports</h1>
<div class="subtitle">Sales Recording System</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form action="/login" method="post">

<label>Select User</label>

<select name="username" required>
<option value="">Select User</option>
<option value="ryan">Ryan Mokgethi</option>
<option value="lebo">Lebo Ngobeni</option>
<option value="admin">System Admin</option>
</select>

<label>Password</label>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<div class="footer">
Mok Transports Internal System
</div>

</div>

</body>
</html>
