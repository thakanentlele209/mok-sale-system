<!DOCTYPE html>
<html>

<head>

    <title>Mok Transport Owner Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #eef2f6;
        }

        .logo {
            width: 180px;
            margin-bottom: 10px;
        }

        h1 {
            color: #0d47a1;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-left: 6px solid #0d47a1;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .kpi {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            border-top: 4px solid #0d47a1;
        }

        .kpi h3 {
            margin: 0;
            color: #555;
        }

        .kpi p {
            font-size: 26px;
            font-weight: bold;
            color: #0d47a1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        canvas {
            background: white;
            padding: 15px;
            border-radius: 10px;
            height: 300px !important;
            max-height: 300px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            background: #0d47a1;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1565c0;
        }
    </style>

</head>

<body>

    <img src="/static/logo.png" class="logo">

    <h1>Financial Dashboard</h1>

    <div class="kpi-grid">

        <div class="kpi">
            <h3>Total Revenue</h3>
            <p id="revenue">R0</p>
        </div>

        <div class="kpi">
            <h3>Total Profit</h3>
            <p id="profit">R0</p>
        </div>

        <div class="kpi">
            <h3>Top Client</h3>
            <p>{{ top_client['party'] if top_client else "N/A" }}</p>
        </div>

        <div class="kpi">
            <h3>Top Client Revenue</h3>
            <p>R {{ "{:,.2f}".format(top_client['revenue']) if top_client else 0 }}</p>
        </div>

    </div>

    <div class="card">

        <h3>Owner Analytics</h3>

        <div class="grid">

            <canvas id="monthlyProfit"></canvas>
            <canvas id="clientProfit"></canvas>
            <canvas id="supplierProfit"></canvas>
            <canvas id="forecastChart"></canvas>
            <canvas id="marginTrend"></canvas>

        </div>

    </div>

    <script>

        let monthlyChart
        let clientChart
        let supplierChart

        async function loadAnalytics() {

            const res = await fetch("/owner-analytics", {
                credentials: "include"
            })

            const data = await res.json()

            console.log("Owner Analytics:", data)

            document.getElementById("revenue").innerText =
                "R " + Number(data.revenue || 0).toLocaleString()

            document.getElementById("profit").innerText =
                "R " + Number(data.profit || 0).toLocaleString()

            const months = Object.keys(data.monthly_profit || {})
            const profits = Object.values(data.monthly_profit || {})

            if (monthlyChart) monthlyChart.destroy()

            monthlyChart = new Chart(
                document.getElementById("monthlyProfit").getContext("2d"),
                {
                    type: "bar",
                    data: {
                        labels: months,
                        datasets: [{
                            label: "Monthly Profit",
                            data: profits
                        }]
                    }
                })

            const clients = Object.keys(data.client_profit || {})
            const clientProfit = Object.values(data.client_profit || {})

            if (clientChart) clientChart.destroy()

            clientChart = new Chart(
                document.getElementById("clientProfit").getContext("2d"),
                {
                    type: "pie",
                    data: {
                        labels: clients,
                        datasets: [{
                            data: clientProfit
                        }]
                    }
                })

            const suppliers = Object.keys(data.supplier_profit || {})
            const supplierProfit = Object.values(data.supplier_profit || {})

            if (supplierChart) supplierChart.destroy()

            supplierChart = new Chart(
                document.getElementById("supplierProfit").getContext("2d"),
                {
                    type: "doughnut",
                    data: {
                        labels: suppliers,
                        datasets: [{
                            data: supplierProfit
                        }]
                    }
                })

        }



        async function loadForecast() {

            const res = await fetch("/revenue-forecast", { credentials: "include" })
            const data = await res.json()

            new Chart(
                document.getElementById("forecastChart"),
                {
                    type: "bar",
                    data: {
                        labels: [data.forecast_month],
                        datasets: [{
                            label: "Predicted Revenue",
                            data: [data.forecast_revenue]
                        }]
                    }
                })
        }

        async function loadMarginTrend() {

            const res = await fetch("/profit-margin-trend", { credentials: "include" })
            const data = await res.json()

            const months = Object.keys(data)
            const margins = Object.values(data)

            new Chart(
                document.getElementById("marginTrend"),
                {
                    type: "line",
                    data: {
                        labels: months,
                        datasets: [{
                            label: "Profit Margin %",
                            data: margins
                        }]
                    }
                })
        }

        loadMarginTrend()

        loadForecast()

        loadAnalytics()

    </script>

</body>

</html>
