<!DOCTYPE html>
<html>
<head>
    <title>MOK Transport Sales</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; margin: 40px; }
        input, select, button { margin: 5px; padding: 6px; }
        table { border-collapse: collapse; margin-top: 20px; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background-color: #f4f4f4; }
        .edit-btn { background-color: orange; color: white; border: none; padding: 5px 10px; }
        .delete-btn { background-color: red; color: white; border: none; padding: 5px 10px; }
        .save-btn { background-color: green; color: white; border: none; padding: 6px 12px; }
        canvas { margin-top: 40px; }
    </style>
</head>
<body>

<h2>MOK Transport Sales Recording</h2>

<form id="saleForm">
    <input type="hidden" id="saleId">
    <input type="date" id="date" required>
    <input type="text" id="party" placeholder="Party Name (Kone, Otis...)" required>
    <input type="number" id="amount" placeholder="Amount" required>
    <select id="vat_enabled">
        <option value="true">VAT Included</option>
        <option value="false">No VAT</option>
    </select>
    <button type="submit" class="save-btn">Save Sale</button>
</form>

<button onclick="exportExcel()">Export to Excel</button>

<h3>Sales Records</h3>
<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Party</th>
            <th>Amount</th>
            <th>VAT</th>
            <th>Total</th>
            <th>Profit</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>
    </thead>
    <tbody id="salesTable"></tbody>
</table>

<h3>Monthly Profit Dashboard</h3>
<canvas id="monthlyChart"></canvas>

<h3>Profit by Party Dashboard</h3>
<canvas id="partyChart"></canvas>

<script>
let monthlyChart;
let partyChart;

/* ================= LOAD SALES ================= */
async function loadSales() {
    const res = await fetch("/sales");
    const data = await res.json();

    const table = document.getElementById("salesTable");
    table.innerHTML = "";

    data.forEach(row => {
        table.innerHTML += `
            <tr>
                <td>${row.date}</td>
                <td>${row.party}</td>
                <td>${row.amount}</td>
                <td>${row.vat}</td>
                <td>${row.total}</td>
                <td>${row.profit}</td>
                <td><button class="edit-btn" onclick="editSale(${row.id})">Edit</button></td>
                <td><button class="delete-btn" onclick="deleteSale(${row.id})">Delete</button></td>
            </tr>
        `;
    });
}

/* ================= LOAD MONTHLY DASHBOARD ================= */
async function loadMonthlyDashboard() {
    const res = await fetch("/dashboard-monthly");
    const data = await res.json();

    const labels = data.map(d => d.month);
    const profits = data.map(d => d.total_profit);

    if (monthlyChart) monthlyChart.destroy();

    const ctx = document.getElementById("monthlyChart").getContext("2d");
    monthlyChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Monthly Profit",
                data: profits
            }]
        }
    });
}

/* ================= LOAD PARTY DASHBOARD ================= */
async function loadPartyDashboard() {
    const res = await fetch("/dashboard-party");
    const data = await res.json();

    const labels = data.map(d => d.party);
    const profits = data.map(d => d.total_profit);

    if (partyChart) partyChart.destroy();

    const ctx = document.getElementById("partyChart").getContext("2d");
    partyChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Profit by Party",
                data: profits
            }]
        }
    });
}

/* ================= SAVE / UPDATE SALE ================= */
document.getElementById("saleForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const id = document.getElementById("saleId").value;
    const date = document.getElementById("date").value;
    const party = document.getElementById("party").value;
    const amount = document.getElementById("amount").value;
    const vat_enabled = document.getElementById("vat_enabled").value;

    if (id) {
        await fetch(`/update-sale/${id}?vat_enabled=${vat_enabled}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ date, party, amount })
        });
    } else {
        await fetch(`/record-sale?vat_enabled=${vat_enabled}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ date, party, amount })
        });
    }

    document.getElementById("saleForm").reset();
    document.getElementById("saleId").value = "";

    loadSales();
    loadMonthlyDashboard();
    loadPartyDashboard();
});

/* ================= EDIT SALE ================= */
async function editSale(id) {
    const res = await fetch("/sales");
    const data = await res.json();
    const row = data.find(r => r.id == id);

    document.getElementById("saleId").value = row.id;
    document.getElementById("date").value = row.date;
    document.getElementById("party").value = row.party;
    document.getElementById("amount").value = row.amount;

    window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ================= DELETE SALE ================= */
async function deleteSale(id) {
    await fetch(`/delete-sale/${id}`, { method: "DELETE" });

    loadSales();
    loadMonthlyDashboard();
    loadPartyDashboard();
}

/* ================= EXPORT ================= */
function exportExcel() {
    window.location.href = "/export-excel";
}

/* ================= INITIAL LOAD ================= */
loadSales();
loadMonthlyDashboard();
loadPartyDashboard();

</script>

</body>
</html>
